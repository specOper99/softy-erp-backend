# ============================================================================
# Coolify production stack: backend only.
# Build Pack: Docker Compose. Point Coolify at this file.
#
# Postgres, Redis, and Garage (S3-compatible storage) are Coolify-managed
# standalone resources — NOT part of this compose. Attach them to the same
# project/network in Coolify UI and inject connection env vars below.
#
# Secrets are injected via Coolify UI -> Environment Variables (NOT committed).
# ============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      # --- Database (Coolify-managed Postgres; use host from that resource) ---
      # Prefer split DB_* or a single DATABASE_URL — both are supported by db-config.
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_SYNCHRONIZE: 'false'
      # Migrations are devops one-off (node dist/database/migrate.js). Entrypoint waits.
      DB_MIGRATIONS_RUN: 'false'
      DB_WAIT_RETRIES: ${DB_WAIT_RETRIES:-30}
      DB_WAIT_DELAY: ${DB_WAIT_DELAY:-2}
      MIGRATION_WAIT_RETRIES: ${MIGRATION_WAIT_RETRIES:-60}
      MIGRATION_WAIT_DELAY: ${MIGRATION_WAIT_DELAY:-5}
      # --- Cache (Coolify-managed Redis) ---
      REDIS_URL: ${REDIS_URL}
      # --- Object storage (Coolify-managed Garage / any S3 path-style endpoint) ---
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-garage}
      # --- Required secrets (set in Coolify env) ---
      JWT_SECRET: ${JWT_SECRET}
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      PASSWORD_RESET_TOKEN_SECRET: ${PASSWORD_RESET_TOKEN_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CURSOR_SECRET: ${CURSOR_SECRET:-}
      # --- App ---
      APP_NAME: ${APP_NAME:-Softy ERP}
      COMPANY_NAME: ${COMPANY_NAME:-Softy}
      COMPANY_URL: ${COMPANY_URL:-}
      TRUST_PROXY: 'true'
      CORS_ORIGINS: ${CORS_ORIGINS}
      # --- Telemetry off unless you deploy a collector ---
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      # --- Mail ---
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      # --- Seed (first boot only) ---
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_STAFF_PASSWORD: ${SEED_STAFF_PASSWORD:-}
      SEED_OPS_PASSWORD: ${SEED_OPS_PASSWORD:-}
      SEED_TENANT_NAME: ${SEED_TENANT_NAME:-Default Organization}
      SEED_TENANT_SLUG: ${SEED_TENANT_SLUG:-default-org}
      SEED_EMAIL_DOMAIN: ${SEED_EMAIL_DOMAIN:-soft-y.org}
    healthcheck:
      # start_period covers DB wait + migration-wait poll + Nest boot so Coolify
      # does not restart the container while devops applies schema.
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health/live || exit 1']
      interval: 15s
      timeout: 5s
      start_period: 180s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 256M
    mem_limit: 768M
    cpus: 1.0
    volumes:
      - logs_data:/app/logs
    ports:
      - '3000'

volumes:
  logs_data:
