# ============================================================================
# Coolify production stack: backend only.
# Build Pack: Docker Compose. Point Coolify at this file.
#
# Postgres, Redis, and Garage (S3-compatible storage) are Coolify-managed
# standalone resources — NOT part of this compose. Attach them to the same
# project/network in Coolify UI and inject connection env vars below.
#
# Secrets are injected via Coolify UI -> Environment Variables (NOT committed).
# ============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      # --- Database (Coolify-managed Postgres; use host from that resource) ---
      # Prefer split DB_* or a single DATABASE_URL — both are supported by db-config.
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_SYNCHRONIZE: 'false'
      # Migrations are devops one-off (node dist/database/migrate.js). Entrypoint waits.
      DB_MIGRATIONS_RUN: 'false'
      DB_WAIT_RETRIES: ${DB_WAIT_RETRIES:-30}
      DB_WAIT_DELAY: ${DB_WAIT_DELAY:-2}
      # Bounded so worst-case wait (DB 60s + migration 150s = 210s) stays under the
      # healthcheck start_period (240s) -> container is never killed mid-wait.
      MIGRATION_WAIT_RETRIES: ${MIGRATION_WAIT_RETRIES:-30}
      MIGRATION_WAIT_DELAY: ${MIGRATION_WAIT_DELAY:-5}
      # --- Cache (Coolify-managed Redis) ---
      REDIS_URL: ${REDIS_URL}
      # --- Object storage (Coolify-managed Garage / any S3 path-style endpoint) ---
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-garage}
      # --- Required secrets (set in Coolify env) ---
      JWT_SECRET: ${JWT_SECRET}
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      PASSWORD_RESET_TOKEN_SECRET: ${PASSWORD_RESET_TOKEN_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CURSOR_SECRET: ${CURSOR_SECRET:-}
      # --- App ---
      APP_NAME: ${APP_NAME:-Softy ERP}
      COMPANY_NAME: ${COMPANY_NAME:-Softy}
      COMPANY_URL: ${COMPANY_URL:-}
      TRUST_PROXY: 'true'
      CORS_ORIGINS: ${CORS_ORIGINS}
      # --- Telemetry off unless you deploy a collector ---
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      # --- Mail ---
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      # --- Seed (first boot only) ---
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_STAFF_PASSWORD: ${SEED_STAFF_PASSWORD:-}
      SEED_OPS_PASSWORD: ${SEED_OPS_PASSWORD:-}
      SEED_TENANT_NAME: ${SEED_TENANT_NAME:-Default Organization}
      SEED_TENANT_SLUG: ${SEED_TENANT_SLUG:-default-org}
      SEED_EMAIL_DOMAIN: ${SEED_EMAIL_DOMAIN:-soft-y.org}
    healthcheck:
      # start_period (240s) must exceed the worst-case entrypoint wait
      # (DB wait 60s + migration wait 150s + Nest boot buffer). Otherwise the
      # liveness probe fails while wait-for-migrations is still polling and
      # Coolify kills+restarts the container mid-wait -> the restart storm.
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health/live || exit 1']
      interval: 15s
      timeout: 5s
      start_period: 240s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 256M
    mem_limit: 768M
    cpus: 1.0
    volumes:
      - logs_data:/app/logs
    ports:
      - '3000'

  # --------------------------------------------------------------------------
  # Devops one-off migration runner. NOT started on a normal deploy (gated by
  # the `migrate` compose profile). Overrides the image entrypoint so it runs
  # migrations directly instead of the wait-for-migrations gate.
  #
  # Trigger it manually from the Coolify server terminal (host), e.g.:
  #   docker compose -f docker-compose.coolify.yml --profile migrate \
  #     run --rm migrate
  #
  # It waits for Postgres, applies pending migrations, validates schema, exits.
  # Once it exits 0, the backend's wait-for-migrations gate sees zero pending
  # and boots. `restart: no` guarantees it never crash-loops.
  #
  # NOTE: `exclude_from_hc: true` (a Coolify-only field) is intentionally NOT
  # set here — with a profile-gated service it is unnecessary (the container is
  # never part of the deployed stack) and it would break raw `docker compose`
  # validation / the manual trigger command above.
  # --------------------------------------------------------------------------
  migrate:
    profiles: ['migrate']
    build:
      context: .
      dockerfile: Dockerfile
    restart: 'no'
    entrypoint: ['node', 'dist/database/migrate.js']
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_SYNCHRONIZE: 'false'
      DB_WAIT_RETRIES: ${DB_WAIT_RETRIES:-30}
      DB_WAIT_DELAY: ${DB_WAIT_DELAY:-2}
      MIGRATE_RETRIES: ${MIGRATE_RETRIES:-5}
      MIGRATE_DELAY: ${MIGRATE_DELAY:-3}

volumes:
  logs_data:
