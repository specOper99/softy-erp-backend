name: Backend CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static Checks
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
        timeout-minutes: 5
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Verify lockfile with npm 10.9.8 (deployment parity)
        run: HUSKY=0 npx -y npm@10.9.8 ci --include=dev
      
      - name: Run linter
        run: npm run lint:check

      - name: Run type-check
        run: npm run type-check

      - name: Check circular dependencies
        run: npm run lint:circular

      - name: Check unused files & dependencies (knip)
        run: npm run knip
        continue-on-error: true # Report-only for now: backend has pre-existing unused files/deps

      - name: Check SQL Safety
        run: npm run check:sql-safety

      - name: Check Tenant Query Safety
        run: npm run check:tenant-query-safety

      - name: Check Security Patterns
        run: npm run check:security-patterns

      - name: Check module boundaries (no-new-violations)
        run: npm run check:module-boundaries

      - name: Check governance
        run: npm run check:governance

      - name: Check Layering Contract
        run: npm run check:layering-contract

      - name: Check Authorization Contract
        run: npm run check:authorization-contract

      - name: Check Platform Tenant Body Contract
        run: npm run check:platform-tenant-body

      - name: Check OpenAPI export drift
        run: |
          npm run openapi:export
          git diff --exit-code ../frontend/src/api/openapi.remote.json

      - name: Check Event Contract
        run: npm run check:event-contract

      - name: Check Tenant Contract
        run: npm run check:tenant-contract

      - name: Check Tenant Async Boundary
        run: npm run check:tenant-async-boundary

      - name: Check i18n locale parity
        run: npm run check:i18n-parity

      - name: Check API error keys
        run: npm run check:api-error-keys

      - name: Check production build config
        run: npm run check:build-production-config

      - name: Check migration policy
        run: npm run check:migration-policy

      - name: Check enum migration coverage (offline)
        run: npm run check:enum-migration-coverage

      - name: Check config key safety
        run: npm run check:config-keys

      - name: Check platform tenant lifecycle completeness
        run: npm run check:lifecycle-completeness

      - name: Validate Prometheus monitoring configs
        run: |
          if ! command -v promtool >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq prometheus
          fi
          bash ./scripts/validate-prometheus-config.sh

  test:
    name: Test
    runs-on: [self-hosted, linux, x64, docker]
    needs: static-checks
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 9379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
        timeout-minutes: 5
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run migrations
        run: npm run migration:run
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false

      - name: Check enum sync
        run: npm run check:enum-sync
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false

      - name: Check runtime schema
        run: npm run check:runtime-schema
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false

      - name: Nest boot smoke (production gates)
        run: npm run check:nest-boot-smoke
        env:
          NODE_ENV: production
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false
          DB_MIGRATIONS_RUN: 'false'
          REDIS_URL: redis://localhost:9379/0
          JWT_SECRET: A1b2C3d4E5f6G7h8I9j0K1l2M3n4O5p6Q7r8S9t0U1v2W3x4Y5z6
          PLATFORM_JWT_SECRET: Z9y8X7w6V5u4T3s2R1q0P9o8N7m6L5k4J3i2H1g0F9e8D7c6B5a4
          PASSWORD_RESET_TOKEN_SECRET: R1e2S3e4T5t6O7k8E9n0Secret32charsXX
          ENCRYPTION_KEY: test-encryption-key-must-be-32chars!!
          PAYOUT_GATEWAY: disabled
          VAULT_ENABLED: 'false'
          OTEL_ENABLED: 'false'
          CORS_ORIGINS: http://localhost:3000

      - name: Run tests
        run: npm run test -- --runInBand
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false
          JWT_SECRET: test-jwt-secret-minimum-32-chars-here
          PLATFORM_JWT_SECRET: test-platform-jwt-secret-minimum-32-chars-here
          VAULT_ENABLED: 'false'
          DISABLE_RATE_LIMITING: 'true'

      - name: Update knowledge graph (when graphify available)
        continue-on-error: true
        run: |
          if command -v graphify >/dev/null 2>&1; then
            graphify update .
          else
            echo "graphify not installed on runner — skip (install graphify CLI for automatic graph updates)."
          fi

      - name: Run integration tests
        run: npm run test:integration -- --runInBand
        env:
          NODE_ENV: test
          INTEGRATION_USE_EXISTING_DB: 'true'
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false
          JWT_SECRET: test-jwt-secret-minimum-32-chars-here
          PLATFORM_JWT_SECRET: test-platform-jwt-secret-minimum-32-chars-here
          VAULT_ENABLED: 'false'
          DISABLE_RATE_LIMITING: 'true'

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false
          REDIS_HOST: localhost
          REDIS_PORT: 9379
          JWT_SECRET: test-jwt-secret-minimum-32-chars-here
          PLATFORM_JWT_SECRET: test-platform-jwt-secret-minimum-32-chars-here
          VAULT_ENABLED: 'false'
          DISABLE_RATE_LIMITING: 'true'
          E2E_USE_EXISTING_DB: 'true'

      - name: Run pact tests
        run: npm run test:pact
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-minimum-32-chars-here
          PLATFORM_JWT_SECRET: test-platform-jwt-secret-minimum-32-chars-here

  build:
    name: Build
    runs-on: [self-hosted, linux, x64]
    needs: [static-checks, test]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
        timeout-minutes: 5
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/

  docker:
    name: Build Coolify Docker image
    runs-on: [self-hosted, linux, x64, docker]
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
        timeout-minutes: 5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      
      - name: Build Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: false
          tags: softy-erp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  restore-drill-smoke:
    name: Restore drill smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
        timeout-minutes: 5

      - name: Validate recovery-drill wiring
        env:
          RESTORE_DRILL_DRY_RUN: 'true'
        run: |
          test -x ./scripts/recovery-drill.sh
          bash -n ./scripts/recovery-drill.sh
          bash ./scripts/recovery-drill.sh --help
          bash ./scripts/recovery-drill.sh --smoke
          RESTORE_DRILL_DRY_RUN=true bash ./scripts/recovery-drill.sh --full
