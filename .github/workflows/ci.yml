name: Backend CI

on:
  push:
    branches: [main, develop, 'refactor/**', 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
        timeout-minutes: 5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint:check

      - name: Run type-check
        run: npm run type-check

      - name: Check SQL Safety
        run: npm run check:sql-safety

      - name: Check Tenant Query Safety
        run: npm run check:tenant-query-safety

      - name: Check Security Patterns
        run: npm run check:security-patterns

      - name: Check Layering Contract
        run: npm run check:layering-contract

      - name: Check Authorization Contract
        run: npm run check:authorization-contract

      - name: Check Platform Tenant Body Contract
        run: npm run check:platform-tenant-body

      - name: Check Event Contract
        run: npm run check:event-contract

      - name: Check Tenant Contract
        run: npm run check:tenant-contract

      - name: Check Tenant Async Boundary
        run: npm run check:tenant-async-boundary

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: static-checks
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 9379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
        timeout-minutes: 5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test -- --runInBand
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false
          JWT_SECRET: test-jwt-secret-minimum-32-chars-here
          VAULT_ENABLED: 'false'
          DISABLE_RATE_LIMITING: 'true'

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false
          REDIS_HOST: localhost
          REDIS_PORT: 9379
          JWT_SECRET: test-jwt-secret-minimum-32-chars-here
          VAULT_ENABLED: 'false'
          DISABLE_RATE_LIMITING: 'true'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [static-checks, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
        timeout-minutes: 5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
        timeout-minutes: 5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: softy-erp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
