name: Backend Security
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: Secret Scanning
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: TruffleHog OSS (Pull Request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.91.2
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (Push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@v3.91.2
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --debug --only-verified

      - name: TruffleHog OSS (Scheduled)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: trufflesecurity/trufflehog@v3.91.2
        with:
          path: ./
          extra_args: --debug --only-verified

  trivy:
    name: Container Vulnerabilities
    runs-on: [self-hosted, linux, x64, docker]
    steps:
      - uses: actions/checkout@v6.0.2
      
      - name: Build Docker Image
        run: docker build -t app:${{ github.sha }} .
        
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  checkov:
    name: IaC Security (${{ matrix.framework }})
    runs-on: [self-hosted, linux, x64, docker]
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: dockerfile
            skip_check: CKV_DOCKER_2
          - framework: helm
            skip_check: ""
          - framework: kubernetes
            skip_check: ""
    steps:
      - uses: actions/checkout@v6.0.2
      
      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: .
          framework: ${{ matrix.framework }}
          quiet: true
          soft_fail: false # Fail build on violations
          skip_check: ${{ matrix.skip_check }}

  npm-audit:
    name: Dependency Audit
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci --ignore-scripts
        
      - name: Run NPM Audit
        run: npm audit --audit-level=high
