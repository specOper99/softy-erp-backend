name: Backend Deploy

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Deploy Preflight
    runs-on: [self-hosted, linux, x64]
    environment: production
    outputs:
      deploy_ready: ${{ steps.preflight.outputs.deploy_ready }}
    steps:
      - name: Evaluate deploy configuration
        id: preflight
        shell: bash
        env:
          BACKEND_DEPLOY_ENABLED: ${{ vars.BACKEND_DEPLOY_ENABLED }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=()

          if [ "${BACKEND_DEPLOY_ENABLED}" != "true" ]; then
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Backend deploy skipped"
              echo ""
              echo "Set \`BACKEND_DEPLOY_ENABLED\` to \`true\` to enable deployment from this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          [ -n "${DEPLOY_HOST}" ] || missing+=("DEPLOY_HOST")
          [ -n "${DEPLOY_USER}" ] || missing+=("DEPLOY_USER")
          [ -n "${DEPLOY_PATH}" ] || missing+=("DEPLOY_PATH")
          [ -n "${DEPLOY_SSH_KEY}" ] || missing+=("DEPLOY_SSH_KEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Backend deploy skipped"
              echo ""
              echo "Missing required deploy configuration: ${missing[*]}."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "deploy_ready=true" >> "$GITHUB_OUTPUT"
          {
            echo "## Backend deploy enabled"
            echo ""
            echo "Deploy configuration is present. Continuing with deploy job."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy Backend to Self-Hosted Server
    runs-on: [self-hosted, linux, x64]
    needs: preflight
    if: needs.preflight.outputs.deploy_ready == 'true'
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH }}
      PM2_APP_NAME: ${{ vars.BACKEND_PM2_APP_NAME }}
      HEALTHCHECK_URL: ${{ vars.BACKEND_HEALTHCHECK_URL }}
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Validate deployable build
        run: |
          npm ci
          npm run lint:check
          npm run type-check
          npm run build

      - name: Create release bundle
        run: git archive --format=tar.gz --output=backend-release.tgz HEAD

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        shell: bash
        run: |
          scp -P "${DEPLOY_PORT:-22}" backend-release.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/backend-${GITHUB_SHA}.tgz"

      - name: Deploy release on server
        shell: bash
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "export GITHUB_SHA='${GITHUB_SHA}' DEPLOY_PATH='${DEPLOY_PATH}' PM2_APP_NAME='${PM2_APP_NAME:-softy-backend}' HEALTHCHECK_URL='${HEALTHCHECK_URL}' NODE_ENV='production'; bash -s" <<'EOF'
          set -euo pipefail

          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "DEPLOY_PATH is required."
            exit 1
          fi

          RELEASES_DIR="${DEPLOY_PATH}/releases"
          RELEASE_DIR="${RELEASES_DIR}/${GITHUB_SHA}"
          CURRENT_LINK="${DEPLOY_PATH}/current"
          SHARED_DIR="${DEPLOY_PATH}/shared"
          ARCHIVE_PATH="/tmp/backend-${GITHUB_SHA}.tgz"

          mkdir -p "${RELEASES_DIR}" "${SHARED_DIR}"
          rm -rf "${RELEASE_DIR}"
          mkdir -p "${RELEASE_DIR}"

          tar -xzf "${ARCHIVE_PATH}" -C "${RELEASE_DIR}"
          rm -f "${ARCHIVE_PATH}"

          if [ -f "${SHARED_DIR}/.env" ]; then
            ln -sfn "${SHARED_DIR}/.env" "${RELEASE_DIR}/.env"
          fi

          ln -sfn "${RELEASE_DIR}" "${CURRENT_LINK}"

          cd "${CURRENT_LINK}"
          npm ci
          npm run build
          npm run migration:run

          pm2 delete "${PM2_APP_NAME}" || true
          pm2 start npm --name "${PM2_APP_NAME}" --cwd "${CURRENT_LINK}" -- start:prod
          pm2 save

          if [ -n "${HEALTHCHECK_URL:-}" ]; then
            curl --fail --silent --show-error "${HEALTHCHECK_URL}"
          fi
          EOF
