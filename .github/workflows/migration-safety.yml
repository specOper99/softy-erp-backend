name: Migration Safety
on:
  pull_request:
    paths:
      - 'src/database/migrations/**'
      - 'src/**/*.entity.ts'
      - 'src/**/enums/*.enum.ts'

jobs:
  migration-check:
    name: Validate Migrations
    runs-on: [self-hosted, linux, x64, docker]

    # PostgreSQL service for real migration testing
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check enum migration coverage (offline)
        run: npm run check:enum-migration-coverage

      - name: List Pending Migrations
        run: npm run migration:show
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: true

      - name: Run Migrations (Forward)
        run: |
          echo "🔄 Running migrations forward..."
          npm run migration:run
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: true

      - name: Check enum sync
        run: npm run check:enum-sync
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false

      - name: Assert runtime schema compatibility
        run: npm run check:runtime-schema
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: false

      - name: Run Migrations (Revert)
        run: |
          echo "🔙 Testing migration revert..."
          npm run migration:revert
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: true

      - name: Re-run Migrations
        run: |
          echo "🔄 Re-running migrations to verify idempotency..."
          npm run migration:run
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          DB_SYNCHRONIZE: false
          DB_LOGGING: true

      - name: Type Check
        run: npm run type-check

      - name: Migration Summary
        if: always()
        run: |
          echo "## Migration Safety Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Migrations validated successfully" >> "$GITHUB_STEP_SUMMARY"
